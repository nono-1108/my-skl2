<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aplikasi SKL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="style.css" rel="stylesheet">
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

    <div id="loginApp" class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                
                <div class="card form-wrapper p-4 shadow-lg" style="height: auto; max-height: none;">
                    
                    <div class="text-center mb-4 mt-2">
                        <h3 class="fw-bold text-white mb-1">Admin SKL</h3>
                        <p class="text-white-50 small">Silakan login untuk kelola data</p>
                    </div>

                    <form @submit.prevent="doLogin">
                        <div class="mb-3">
                            <label class="form-label text-white small">Username</label>
                            <input type="text" v-model="username" class="form-control" placeholder="admin" required autofocus>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label text-white small">Password</label>
                            <input type="password" v-model="password" class="form-control" placeholder="••••••••" required>
                        </div>
                        
                        <button type="submit" class="btn w-100 fw-bold text-white mb-3" style="background-color: #712cf9; border-radius: 8px;">
                            MASUK
                        </button>
                    </form>
                    
                </div>
                
                <div class="text-center mt-3 text-white-50 small">
                    &copy; 2026 My-SKL. copyright by nono.
                </div>

            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    username: '',
                    password: ''
                }
            },
            methods: {
                async doLogin() {
                    if (this.username === 'admin' && this.password === 'admin123') {
                        
                        localStorage.setItem('skl_logged_in', 'true');
                        
                        window.location.href = 'index.html'; 
                        
                    } else {
                        alert('Username atau password salah!');
                        this.password = ''; 
                    }
                }
            },
            mounted() {
                if (localStorage.getItem('skl_logged_in') === 'true') {
                    window.location.href = 'index.html';
                }
            }
        }).mount('#loginApp');
    </script>
</body>
</html>
